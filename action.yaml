name: 'action-releaser'
description: 'Flexible GitHub Action for versioned releases powered by git-cliff'
author: 'group:default/dai'

inputs:
  version-strategy:
    description: 'Versioning strategy: semver or calver'
    required: false
    default: 'semver'
  cliff-config:
    description: 'Path to custom cliff.toml (auto-detects cliff.toml in repo root if not set)'
    required: false
    default: ''
  tag-prefix:
    description: 'Prefix for git tags (e.g. v, release-)'
    required: false
    default: ''
  release-mode:
    description: 'Release mode: direct (immediate release) or pr (create release PR, release on merge)'
    required: false
    default: 'direct'
  draft:
    description: 'Create release as draft'
    required: false
    default: 'false'
  prerelease:
    description: 'Mark release as prerelease'
    required: false
    default: 'false'
  include-path:
    description: 'Glob pattern to scope commits by file path (e.g. "services/api/**"). Used in monorepos to ensure only commits touching this path affect version calculation and changelog.'
    required: false
    default: ''
  dry-run:
    description: 'Calculate version and changelog but do not create a tag or release'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for release creation. Needs contents:write scope.'
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: 'Calculated version string (empty if skipped)'
  changelog:
    description: 'Generated changelog text (empty if skipped)'
  tag:
    description: 'Created git tag (empty if skipped or dry-run)'
  release-url:
    description: 'URL of the published GitHub Release. Only set when a release is actually created (direct mode, or gated mode after PR merge). Empty in pr mode before the PR is merged.'
  previous-version:
    description: 'Previous version tag (empty on first release)'
  skipped:
    description: 'true if no release was created, false otherwise'
  pr-url:
    description: 'Release PR URL (only in pr mode, same as release-pr-url)'
  dry-run:
    description: 'true if dry-run mode was active'
  release-published:
    description: 'true when a GitHub Release was actually created (direct mode or after gated PR merge)'
  release-pr-url:
    description: 'URL of the open release PR (only set in pr mode while the PR is pending merge)'
  release-pr-number:
    description: 'Number of the open release PR (only set in pr mode while the PR is pending merge)'
  release-mode:
    description: 'Active release mode: "direct" or "pr". Echoes the release-mode input so downstream jobs can branch without re-reading inputs.'
  pr-created:
    description: 'true when a new release PR was opened in this run; false when an existing PR was updated. Only meaningful in pr mode.'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/dnd-it/action-releaser:0.2.4' # x-release-please-version

branding:
  icon: 'tag'
  color: 'green'
